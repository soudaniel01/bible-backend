

server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/base}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:root}

# JPA Configuration - DDL configurado dinamicamente baseado no Flyway
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# Flyway Configuration - Habilitado temporariamente para inserir dados iniciais
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.clean-disabled=true

# Inicialização do datasource - configurada dinamicamente
spring.jpa.defer-datasource-initialization=${JPA_DEFER_INIT:false}

security.token.secret=${SECURITY_TOKEN_SECRET:dev_secret_key_change_in_production_environment_1234567890}
frontend.allowed.origins=${FRONTEND_ALLOWED_ORIGINS:http://localhost:5173}

# JWT Token Configuration
app.jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800}
app.jwt.max-active-sessions=${JWT_MAX_ACTIVE_SESSIONS:5}
app.jwt.use-cookie=${JWT_USE_COOKIE:true}
app.jwt.keys.activeKid=key1
app.jwt.keys.key1.secret=${SECURITY_TOKEN_SECRET:dev_secret_key_change_in_production_environment_1234567890}
app.jwt.keys.key2.secret=${SECURITY_TOKEN_SECRET_2:}

# Security Cookies Configuration
app.security.same-site=${SECURITY_SAME_SITE:Lax}
app.security.secure-cookie=${SECURITY_SECURE_COOKIE:false}
app.security.require-tenant-claim=false

# Logging Configuration
logging.level.com.api.auth=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
spring.mvc.log-request-details=false
app.login.suspension.email.window-minutes=1
app.login.suspension.email.max-attempts=5
app.login.suspension.ip.window-minutes=1
app.login.suspension.ip.max-attempts=10

# Habilita tratamento de cabeçalhos encaminhados (X-Forwarded-For, X-Forwarded-Proto)
server.forward-headers-strategy=framework

# Actuator (Health / Info)
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

app.security.ratelimit.enabled=true
app.security.ratelimit.login.ip.capacity=10
app.security.ratelimit.login.ip.windowSeconds=60
app.security.ratelimit.login.principal.capacity=5
app.security.ratelimit.login.principal.windowSeconds=60
app.security.ratelimit.refresh.ip.capacity=30
app.security.ratelimit.refresh.ip.windowSeconds=60
app.security.ratelimit.penalty.enabled=true
app.security.ratelimit.penalty.cooldownSeconds=300
